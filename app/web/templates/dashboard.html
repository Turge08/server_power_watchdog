{% extends "base.html" %}
{% block content %}
<div class="grid">
  <section class="panel"
    hx-get="/partials/status"
    hx-trigger="load, every 5s"
    hx-swap="innerHTML">
    Loading status...
  </section>

  <section class="panel"
    hx-get="/partials/actions"
    hx-trigger="load"
    hx-swap="innerHTML">
    Loading actions...
  </section>

  <section class="panel"
    hx-get="/partials/events"
    hx-trigger="load, every 10s"
    hx-swap="innerHTML">
    Loading events...
  </section>
</div>
{% endblock %}
