<h2>Recent Events</h2>
<table class="events-table">
  <thead>
    <tr>
      <th>Time</th>
      <th>Level</th>
      <th>Source</th>
      <th>Message</th>
    </tr>
  </thead>
  <tbody>
    {% for event in state.events[:25] %}
    <tr>
      <td>{{ event.ts }}</td>
      <td>{{ event.level }}</td>
      <td>{{ event.source }}</td>
      <td>{{ event.message }}</td>
    </tr>
    {% else %}
    <tr>
      <td colspan="4">No events yet.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
