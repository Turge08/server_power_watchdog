<h2>Actions</h2>

<div class="actions-row">
  {% if settings.allow_power_control %}
    <button class="btn btn-warn"
            hx-post="/actions/power-on"
            hx-confirm="Send power-on command to the server?"
            hx-target="closest section"
            hx-swap="outerHTML">
      Power on server
    </button>
  {% else %}
    <button class="btn btn-disabled" disabled>
      Power control disabled
    </button>
  {% endif %}
</div>

<p class="muted">
  Automatic and manual power control are currently
  <strong>{{ 'enabled' if settings.allow_power_control else 'disabled' }}</strong>.
</p>
