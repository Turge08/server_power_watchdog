[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
user=root
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:nut-driver]
command=/bin/sh -c 'UPS_NAME=$(awk -F"[][]" "/^\[.*\]/{print \$2; exit}" /etc/nut/ups.conf); exec /lib/nut/usbhid-ups -a "$UPS_NAME" -F'
priority=10
autorestart=true
startsecs=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:upsd]
command=/bin/sh -c "mkdir -p /run/nut /var/run/nut && chown root:nut /run/nut /var/run/nut && chmod 0775 /run/nut /var/run/nut && exec /usr/sbin/upsd -u root -F"
priority=20
autorestart=true
startsecs=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:web]
command=/usr/local/bin/uvicorn app.main:app --host 0.0.0.0 --port 8080
directory=/app
priority=30
autorestart=true
startsecs=3
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
